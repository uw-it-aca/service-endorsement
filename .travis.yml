sudo: false
services:
  - docker
env:
  - GOOGLE_APPLICATION_CREDENTIALS=$TRAIVS_BUILD_DIR/encrypted-sa-creds.json
before_install:
  - if [ ! -d $HOME/gcloud/google-cloud-sdk ]; then
          mkdir -p $HOME/gcloud &&
          wget https://dl.google.com/dl/cloudsdk/release/google-cloud-sdk.tar.gz --directory-prefix=$HOME/gcloud &&
          cd $HOME/gcloud &&
          tar xzf google-cloud-sdk.tar.gz &&
          printf '\ny\n\ny\ny\n' | ./google-cloud-sdk/install.sh &&
          cd $TRAVIS_BUILD_DIR;
install:
  - openssl aes-256-cbc -K $encrypted_0a6446eb3ae3_key -iv $encrypted_0a6446eb3ae3_iv -in encrypted-sa-creds.json.enc -out encrypted-sa-creds.json -d
  - GOOGLE_APPLICATION_CREDENTIALS = $(pwd)/encrypted-sa-creds.json
  - export GOOGLE_APPLICATION_CREDENTIALS
  - docker-compose up --build -d
  - sleep 15
script:
  - docker ps
  - docker exec -u root app bash -c '. docker/test.sh'
  - docker cp app:/app/.coverage ./.coverage
after_success:
  - coveralls
