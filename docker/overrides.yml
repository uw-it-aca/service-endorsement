  bump-up:
    description: "Bump up min replicas to anticpate quick load spike"
    override-values:
      autoscaling:
        minReplicas: 4
        maxReplicas: 8
    timezone: 'US/Pacific'
    dates: 
      - '2021-02-26 16:20:00'
